<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Warm Tails-inspired desk scene</title>
  <desc id="desc">A cozy illustrated workspace with a soft desk lamp, notebook, tools, stars, and twin-tail shapes.</desc>
  <defs>
